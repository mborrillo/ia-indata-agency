name: Backfill Hostelería

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r projects/energia-mercados-hosteleria/requirements.txt

      - name: Ejecutar backfill
        env:
          NEON_DATABASE_URL: ${{ secrets.HOSTELERIA_NEON_URL }}
        run: |
          cd projects/energia-mercados-hosteleria
          python etl/backfill.py 20
