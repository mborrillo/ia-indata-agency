name: ETL Diario — MEMO Hostelería

on:
  schedule:
    - cron: '30 7 * * 1-5'  # L-V 07:30 UTC (09:30 Madrid)
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r projects/energia-mercados-hosteleria/requirements.txt

      - name: Verificar archivos en runner
        run: |
                echo "=== ingest_gas.py líneas 1-5 ==="
                head -5 projects/energia-mercados-hosteleria/etl/ingest_gas.py
                echo "=== ingest_aceite.py líneas 1-5 ==="
                head -5 projects/energia-mercados-hosteleria/etl/ingest_aceite.py
                echo "=== run_daily.py líneas 1-5 ==="
                head -5 projects/energia-mercados-hosteleria/etl/run_daily.py        

      - name: Ejecutar ETL
        env:
          NEON_DATABASE_URL: ${{ secrets.HOSTELERIA_NEON_URL }}
        run: |
          cd projects/energia-mercados-hosteleria
          python -m etl.run_daily

      - name: Notificar fallo
        if: failure()
        run: echo "::error::ETL Hostelería falló — revisar logs"
