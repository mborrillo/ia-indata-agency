name: retail-prueba-main

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/retail-prueba

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/retail-prueba/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Debug
        run: |
          python -c "
      import os
      from dotenv import load_dotenv
      load_dotenv()
      val = os.getenv('NEON_RETAIL_PRUEBA')
      print('VALOR:', repr(val))
      print('LONGITUD:', len(val) if val else 0)
      "
        env:
          NEON_RETAIL_PRUEBA: ${{ secrets.NEON_RETAIL_PRUEBA }}

      - name: Ejecutar ETL
        env:
          NEON_RETAIL_PRUEBA: ${{ secrets.NEON_RETAIL_PRUEBA }}
        run: python etl/run_daily.py

      - name: Notificar fallo
        if: failure()
        run: echo "ETL falló — revisar logs en Actions"
